services:
  # ==========================================================================
  # dev: Long-running development container (docker compose up dev)
  # Use: docker compose exec dev bash
  #   - ccache persisted across rebuilds
  #   - Build artifacts preserved in container
  #   - X11 forwarding for Pangolin viewer
  # ==========================================================================
  dev:
    image: orb-slam3-remastered:dev
    container_name: remastered-dev
    volumes:
      - .:/workspace
      - ../Datasets:/datasets:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ccache:/ccache
    working_dir: /workspace
    environment:
      - LD_LIBRARY_PATH=/workspace/lib:/usr/local/lib
      - DISPLAY=host.docker.internal:0
      # LIBGL_ALWAYS_INDIRECT removed — breaks Pangolin on macOS Docker
      - XDG_RUNTIME_DIR=/tmp
      - CCACHE_DIR=/ccache
    command: >
      bash -c "ldconfig && echo 'Dev container ready' && sleep infinity"
    stdin_open: true
    tty: true

  # ==========================================================================
  # build: One-shot build (docker compose run --rm build)
  # ==========================================================================
  build:
    image: orb-slam3-remastered:dev
    container_name: remastered-build
    volumes:
      - .:/workspace
      - ccache:/ccache
    working_dir: /workspace
    environment:
      - LD_LIBRARY_PATH=/usr/local/lib
      - CCACHE_DIR=/ccache
    command: >
      bash -c "
        ldconfig &&
        bash scripts/build.sh &&
        echo '=== BUILD SUCCESS ==='
      "

  # ==========================================================================
  # test: Build + run all tests (docker compose run --rm test)
  # ==========================================================================
  test:
    image: orb-slam3-remastered:dev
    container_name: remastered-test
    volumes:
      - .:/workspace
      - ccache:/ccache
    working_dir: /workspace
    environment:
      - LD_LIBRARY_PATH=/usr/local/lib
      - CCACHE_DIR=/ccache
    command: >
      bash -c "
        ldconfig &&
        bash scripts/build.sh > /dev/null 2>&1 &&
        echo '=== Running tests ===' &&
        for t in bin/test_*; do
          timeout 15 $$t --gtest_brief=1 2>&1 | tail -1;
        done
      "

  # ==========================================================================
  # run: Build + run with viewer (docker compose run --rm run)
  # ==========================================================================
  run:
    image: orb-slam3-remastered:dev
    container_name: remastered-run
    volumes:
      - .:/workspace
      - ../Datasets:/datasets:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ccache:/ccache
    working_dir: /workspace
    environment:
      - LD_LIBRARY_PATH=/workspace/lib:/usr/local/lib
      - DISPLAY=host.docker.internal:0
      # LIBGL_ALWAYS_INDIRECT removed — breaks Pangolin on macOS Docker
      - XDG_RUNTIME_DIR=/tmp
      - CCACHE_DIR=/ccache
    command: >
      bash -c "
        ldconfig &&
        bash scripts/build.sh > /dev/null 2>&1 &&
        echo '=== Running Stereo EuRoC with Viewer ===' &&
        ./bin/stereo_euroc Vocabulary/ORBvoc.txt examples/Stereo/EuRoC.yaml /datasets/EuRoc/MH01 examples/Stereo/EuRoC_TimeStamps/MH01.txt
      "

volumes:
  ccache:
    name: orb-slam3-ccache
